[pytest]
# PyTest Configuration for LIFF Design Spec Acceptance Tests

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require services)
    e2e: End-to-end tests (requires manual dev server)
    design_spec: Design specification acceptance tests
    responsive: Responsive design tests
    accessibility: Accessibility tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (seconds) - useful to catch hanging tests
timeout = 30

# Asyncio mode for pytest-asyncio (if used)
asyncio_mode = auto

# Coverage options (if pytest-cov is installed)
# --cov=app/liff_app --cov-report=html --cov-report=term
